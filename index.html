<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TZ Marketplace Exchange Rates</title>
  <link rel="stylesheet" href="forex.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <script src = "rates.js" differ></script>
</head>
<body>
<!-- ═══ Converter ═══ -->
  <div class="calculator">
    <div class="panel-title">
      <h2>Currency Converter</h2>
      <p>Select currencies &amp; enter amount</p>
    </div>

    <!-- FROM row -->
    <div class="conv-row">
      <label>From</label>
      <select id="from-currency" onchange="convertCurrency()"></select>
    </div>

    <!-- Amount input -->
    <div class="amount-field-wrap">
      <input
         style="font-size: 20px;"
        type="text"
        id="amount"
        placeholder="0"
        inputmode="decimal"
        autocomplete="off"
        oninput="formatAmountInput(this); convertCurrency();"
      />
      <span class="tzs-suffix" id="amount-suffix">—</span>
    </div>

  

    <!-- TO row -->
    <div class="conv-row">
      <label>To</label>
      <select id="to-currency" onchange="convertCurrency()"></select>
    </div>

    <!-- Result -->
    <div class="result-wrap">
      <input
      style="font-size: 20px;"
        type="text"
        id="conversion-result"
        placeholder="Amount appears here…"
        readonly
      />
    </div>
  </div>

  <!-- ═══ Rates Table ═══ -->
  <div class="exchange-container">
    <div class="panel-title">
      <h2>Market Exchange Rates</h2>
      <p id="update-time">Fetching rates…</p>
    </div>

    <table id="currency-table">
      <thead>
        <tr>
          <th>Currency</th>
          <th>Code</th>
          <th>Rate (TZS)</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="3" class="loading-cell">
          <div class="loader-wrapper">
            <span>Fetching</span>
            <div class="dot dot-red"></div>
            <div class="dot dot-blue"></div>
            <div class="dot dot-green"></div>
            <div class="dot dot-yellow"></div>
          </div>
        </td></tr>
      </tbody>
    </table>

    <div class="signature">© Designed by ELCAPITANO EMOUR</div>
  </div>
</body>
</html>
